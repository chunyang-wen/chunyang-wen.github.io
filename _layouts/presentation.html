<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>{{ page.title | strip_html }}</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reset.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.css">
  <!-- Using black theme to match previous presentation style -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/theme/black.min.css" id="theme">

  <!-- Theme used for syntax highlighted code -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/plugin/highlight/monokai.min.css"
    id="highlight-theme">
  <style>
    /* Reveal.js Overrides to mimic remark.js formatting */
    .reveal h1,
    .reveal h2,
    .reveal h3,
    .reveal h4,
    .reveal h5,
    .reveal h6 {
      text-transform: none;
      /* Do not uppercase headers automatically */
    }

    .reveal .slides {
      text-align: left;
    }

    .reveal .slides section>* {
      margin-left: 0;
      margin-right: 0;
    }

    /* Enable vertical scrolling for long slides */
    .reveal .slides section {
      overflow-y: auto !important;
      overflow-x: hidden !important;
      max-height: 100vh;
    }

    /* Keep title slides centered vertically if desired, but default to top-align elsewhere */
    .reveal [data-markdown] {
      top: 0 !important;
    }
  </style>
</head>

<body>
  <div class="reveal">
    <div class="slides">
      <section data-markdown data-separator="^\n---\n" data-separator-vertical="^\n--\n">
        <textarea data-template>
{% include slides/{{ page.slide }} %}
                </textarea>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/reveal.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/plugin/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/plugin/highlight/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/5.0.4/plugin/notes/notes.min.js"></script>

  <script>
    Reveal.initialize({
      hash: true,
      slideNumber: true,
      center: false, /* default to top alignment */
      disableLayout: false, /* preserve responsive scaling */
      margin: 0.1,
      // Learn about plugins: https://revealjs.com/plugins/
      plugins: [RevealMarkdown, RevealHighlight, RevealNotes]
    });
  </script>
</body>

</html>
